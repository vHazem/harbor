name: tauri-build

on:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.platform.name }} (${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: msi
          - name: macOS-AppleSilicon
            runner: macos-latest
            target: aarch64-apple-darwin
            bundle: dmg
          - name: macOS-Intel
            runner: macos-13
            target: x86_64-apple-darwin
            bundle: dmg
          - name: Linux-x86_64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle: deb,appimage

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: contains(matrix.platform.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libmpv-dev \
            libgtk-3-dev \
            patchelf

      - name: Install Mac deps
        if: contains(matrix.platform.runner, 'macos')
        run: |
          brew install mpv pkg-config
          # Make pkg-config find libmpv from homebrew
          echo "PKG_CONFIG_PATH=$(brew --prefix mpv)/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            harbor-core
            src-tauri

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Fetch libmpv (Windows)
        if: contains(matrix.platform.runner, 'windows')
        run: pnpm run setup:libmpv

      - name: harbor-core check
        working-directory: harbor-core
        run: |
          cargo check
          cargo test --all-targets

      - name: Tauri build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          args: --target ${{ matrix.platform.target }}

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: harbor-${{ matrix.platform.name }}
          path: |
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.exe
          retention-days: 14
          if-no-files-found: warn

  linux-distro-build:
    name: Linux distro package config
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libmpv-dev \
            libgtk-3-dev \
            patchelf \
            yt-dlp

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            harbor-core
            src-tauri

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Validate distro package config
        run: pnpm run tauri:build:linux-system -- --bundles deb
